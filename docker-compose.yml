services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
    command: redis-server --appendonly yes

  chromadb:
    image: chromadb/chroma:latest
    ports: ["8000:8000"]
    volumes: ["chroma-data:/chroma/chroma"]
    environment:
      - IS_PERSISTENT=TRUE

  adonis:
    build:
      context: .
      # Build-time only. Some hosts (notably Fedora with firewalld+nftables) don't
      # MASQUERADE the docker bridge by default, so pip can't reach PyPI from
      # inside the build container. Using the host network namespace just for
      # the build avoids that dance; runtime networking is unaffected.
      network: host
    depends_on: [redis, chromadb]
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - CHROMA_URL=http://chromadb:8000
      - HERMES_PORT=8088
    ports: ["8088:8088"]
    volumes:
      - ./adonis-vault:/vault
      - ./prometheus:/app/prometheus:ro
    command: ["python", "-c", "import boot_check; boot_check.verify(); import supervisord; supervisord.main()"]

volumes:
  redis-data:
  chroma-data:
