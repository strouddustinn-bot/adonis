services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
    command: redis-server --appendonly yes

  chromadb:
    image: chromadb/chroma:latest
    ports: ["8000:8000"]
    volumes: ["chroma-data:/chroma/chroma"]
    environment:
      - IS_PERSISTENT=TRUE

  adonis:
    build:
      context: .
      network: host
    depends_on: [redis, chromadb]
    env_file: .env
    # Run on the host's network namespace. Reason: many distros (Fedora with
    # firewalld+nftables in particular) put docker0 in a permissive zone but
    # leave the per-project bridge (br-XXXX, created by compose) outside it,
    # so outbound traffic from the project network isn't masqueraded and
    # api.anthropic.com is unreachable. Host networking sidesteps the whole
    # firewall dance — and redis/chromadb publish their ports to the host
    # anyway, so adonis still reaches them via localhost.
    network_mode: host
    environment:
      - REDIS_URL=redis://localhost:6379
      - CHROMA_URL=http://localhost:8000
      - HERMES_PORT=8088
    # No `ports:` — host networking publishes :8088 directly.
    volumes:
      - ./adonis-vault:/vault
      - ./prometheus:/app/prometheus:ro
    command: ["python", "-c", "import boot_check; boot_check.verify(); import supervisord; supervisord.main()"]

volumes:
  redis-data:
  chroma-data:
