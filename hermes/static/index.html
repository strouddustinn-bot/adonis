<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Adonis</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-soft: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --user: #1f6feb22;
    --assistant: #21262d;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 14px; line-height: 1.5;
    display: grid;
    grid-template-rows: 56px 1fr;
  }
  header {
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px;
  }
  header h1 {
    margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.05em;
  }
  header .grow { flex: 1; }
  header .session {
    font-family: var(--mono); font-size: 12px; color: var(--muted);
  }
  header button {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    padding: 4px 10px; font-size: 12px; cursor: pointer; border-radius: 4px;
    font-family: var(--mono);
  }
  header button:hover { color: var(--text); border-color: var(--accent); }
  .mode {
    display: inline-flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
  }
  .mode button {
    border: 0; padding: 6px 12px; font-size: 12px;
    background: transparent; color: var(--muted); cursor: pointer; font-family: var(--mono);
  }
  .mode button.active { background: var(--accent); color: #0d1117; }

  main {
    display: grid;
    grid-template-columns: 1fr 320px;
    overflow: hidden;
  }
  .chat {
    display: flex; flex-direction: column; min-width: 0;
    border-right: 1px solid var(--border);
  }
  .messages {
    flex: 1; overflow-y: auto;
    padding: 20px 24px;
  }
  .empty {
    color: var(--muted); text-align: center; margin-top: 80px;
    font-family: var(--mono); font-size: 13px;
  }
  .msg { margin-bottom: 14px; }
  .msg .who {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin-bottom: 4px; font-family: var(--mono);
  }
  .msg.user .bubble    { background: var(--user); border-color: #1f6feb55; }
  .msg.assistant .bubble { background: var(--assistant); }
  .msg.error .bubble    { background: #f8514922; border-color: var(--red); }
  .bubble {
    padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border);
    white-space: pre-wrap; word-wrap: break-word;
  }
  .meta {
    font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 6px;
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .meta b { color: var(--text); font-weight: normal; }
  details.subtasks { margin-top: 8px; }
  details.subtasks summary { cursor: pointer; color: var(--muted); font-size: 12px; font-family: var(--mono); }
  details.subtasks pre { background: #0a0d12; border: 1px solid var(--border); border-radius: 4px; padding: 10px; overflow-x: auto; font-size: 12px; }

  .input {
    border-top: 1px solid var(--border); padding: 12px 16px;
    background: var(--panel);
    display: flex; gap: 10px; align-items: flex-end;
  }
  textarea {
    flex: 1; resize: none; min-height: 44px; max-height: 200px;
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; font-size: 14px;
    font-family: inherit;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .send {
    background: var(--accent); color: #0d1117; border: 0; padding: 10px 18px;
    font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer;
  }
  .send:disabled { opacity: 0.5; cursor: not-allowed; }

  aside { overflow-y: auto; background: var(--panel); padding: 16px; }
  aside h2 {
    margin: 0 0 8px; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--mono);
    font-weight: 500;
  }
  aside section { margin-bottom: 24px; }
  .kv {
    display: grid; grid-template-columns: max-content 1fr; gap: 4px 12px;
    font-family: var(--mono); font-size: 12px;
  }
  .kv span { color: var(--muted); }
  .kv b { font-weight: normal; color: var(--text); }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; vertical-align: middle; margin-right: 6px; }
  .dot.ok    { background: var(--green); }
  .dot.off   { background: var(--muted); }
  .dot.bad   { background: var(--red); }
  .dot.warn  { background: var(--yellow); }
  .audit {
    font-family: var(--mono); font-size: 11px; line-height: 1.45;
    border-top: 1px solid var(--border); padding-top: 8px;
  }
  .audit .row { display: grid; grid-template-columns: 14px 1fr; gap: 6px; margin-bottom: 6px; }
  .audit .lvl { font-weight: 600; }
  .audit .GREEN  { color: var(--green); }
  .audit .YELLOW { color: var(--yellow); }
  .audit .ORANGE { color: #db6d28; }
  .audit .RED    { color: var(--red); }
  .audit .BLACK  { color: #d2a8ff; }

  .pulse {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); margin-right: 6px; animation: pulse 1.2s infinite ease-in-out;
  }
  @keyframes pulse { 0%,100% { opacity: 0.3 } 50% { opacity: 1 } }

  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; }
    aside { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>ADONIS</h1>
  <div class="mode" role="tablist">
    <button id="mode-ask"  class="active" title="Single-turn answer through the Glasswing pipeline">Ask</button>
    <button id="mode-task" title="Multi-agent goal orchestrated by Atlas">Task</button>
  </div>
  <div class="grow"></div>
  <span class="session" id="session-label">session: —</span>
  <button id="reset-btn" title="Clear conversation and start a new session">reset</button>
</header>

<main>
  <div class="chat">
    <div class="messages" id="messages">
      <div class="empty" id="empty">
        Type below to talk to Adonis.<br>
        Ask = fast, single-turn through Glasswing cache + context.<br>
        Task = decompose &amp; route to specialist agents via Atlas.
      </div>
    </div>
    <div class="input">
      <textarea id="input" placeholder="Talk to Adonis... (Shift+Enter for newline)" rows="1"></textarea>
      <button class="send" id="send">send</button>
    </div>
  </div>

  <aside>
    <section>
      <h2>Services</h2>
      <div class="kv" id="health">
        <span>redis</span>    <b id="h-redis">—</b>
        <span>chroma</span>   <b id="h-chroma">—</b>
        <span>obsidian</span> <b id="h-obsidian">—</b>
        <span>audit</span>    <b id="h-audit">—</b>
      </div>
    </section>

    <section>
      <h2>Agent efficiency (GES)</h2>
      <div class="kv" id="ges"><span>—</span><b>loading…</b></div>
    </section>

    <section>
      <h2>Recent Prometheus decisions</h2>
      <div class="audit" id="audit"><div class="row"><span class="lvl">—</span><span>loading…</span></div></div>
    </section>
  </aside>
</main>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const messagesEl = $("messages");
  const inputEl    = $("input");
  const sendBtn    = $("send");
  const emptyEl    = $("empty");
  const resetBtn   = $("reset-btn");
  const sessionLabel = $("session-label");
  const modeAsk  = $("mode-ask");
  const modeTask = $("mode-task");

  const STORAGE_KEY = "adonis.state.v1";

  let state = loadState();
  let mode = "ask";          // 'ask' | 'task'
  let inflight = false;

  // ── persistence ──────────────────────────────────────────────────────
  function newSessionId() {
    if (crypto && crypto.randomUUID) return "sess_" + crypto.randomUUID().slice(0, 10);
    return "sess_" + Math.random().toString(36).slice(2, 12);
  }
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { sessionId: newSessionId(), messages: [] };
  }
  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }
  function resetSession() {
    state = { sessionId: newSessionId(), messages: [] };
    saveState();
    render();
  }

  // ── rendering ────────────────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  function render() {
    sessionLabel.textContent = "session: " + state.sessionId;
    emptyEl.style.display = state.messages.length ? "none" : "block";
    const html = state.messages.map(renderMessage).join("");
    messagesEl.innerHTML = (state.messages.length ? html : emptyEl.outerHTML);
    if (!state.messages.length) {
      // outerHTML resets the element ref; rebind
      // (cheap workaround: keep emptyEl visible only when empty)
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function renderMessage(m) {
    const meta = m.meta ? renderMeta(m.meta) : "";
    const subs = m.subtasks ? renderSubtasks(m.subtasks) : "";
    return `
      <div class="msg ${m.role}">
        <div class="who">${m.role}</div>
        <div class="bubble">${escapeHtml(m.content)}</div>
        ${meta}
        ${subs}
      </div>`;
  }
  function renderMeta(meta) {
    const parts = [];
    if (meta.cache_hit) parts.push("<b>cache hit</b>");
    if (meta.agents && meta.agents.length) parts.push("agents: <b>" + meta.agents.join(", ") + "</b>");
    if (meta.think)  parts.push("think: <b>" + meta.think + "</b>");
    if (meta.tokens) parts.push("tokens: <b>" + meta.tokens + "</b>");
    if (meta.prep_ms != null) parts.push("prep: <b>" + meta.prep_ms + "ms</b>");
    if (meta.error)  parts.push("<b style='color:#f85149'>" + escapeHtml(meta.error) + "</b>");
    return parts.length ? '<div class="meta">' + parts.join(" · ") + "</div>" : "";
  }
  function renderSubtasks(s) {
    return `<details class="subtasks">
      <summary>subtask trace</summary>
      <pre>${escapeHtml(JSON.stringify(s, null, 2))}</pre>
    </details>`;
  }

  // ── send ─────────────────────────────────────────────────────────────
  async function send() {
    const text = inputEl.value.trim();
    if (!text || inflight) return;
    inflight = true;
    sendBtn.disabled = true;
    sendBtn.textContent = "…";

    state.messages.push({ role: "user", content: text });
    inputEl.value = "";
    autosize();
    saveState();
    render();

    const thinkingIdx = state.messages.push({
      role: "assistant", content: mode === "task" ? "Atlas is dispatching agents…" : "Thinking…",
      _placeholder: true,
    }) - 1;
    render();

    try {
      let res, body;
      if (mode === "ask") {
        body = { message: text, session_id: state.sessionId };
        res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
      } else {
        body = { goal: text, session_id: state.sessionId, timeout_s: 120 };
        res = await fetch("/task", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
      }
      const data = await res.json();

      if (!res.ok) {
        state.messages[thinkingIdx] = {
          role: "error",
          content: data.detail || ("HTTP " + res.status),
        };
      } else if (mode === "ask") {
        state.messages[thinkingIdx] = {
          role: "assistant",
          content: data.answer || "(empty answer)",
          meta: {
            cache_hit: data.cache_hit,
            agents: data.agents,
            think: data.think,
            tokens: data.tokens,
            prep_ms: data.efficiency && data.efficiency.prep_ms,
          },
        };
      } else {
        const r = data.result || {};
        const synthesis = (typeof r.result === "string")
          ? r.result
          : (r.synthesis || JSON.stringify(r, null, 2));
        state.messages[thinkingIdx] = {
          role: "assistant",
          content: synthesis,
          meta: { agents: [r.agent || "atlas"] },
          subtasks: r,
        };
      }
    } catch (e) {
      state.messages[thinkingIdx] = { role: "error", content: String(e) };
    } finally {
      inflight = false;
      sendBtn.disabled = false;
      sendBtn.textContent = "send";
      saveState();
      render();
      // refresh sidebar after each turn so GES/audit feel live
      refreshSidebar();
    }
  }

  // ── sidebar polling ──────────────────────────────────────────────────
  function dot(state) {
    if (state === "ok")   return '<span class="dot ok"></span>';
    if (state === "off")  return '<span class="dot off"></span>';
    if (state === "warn") return '<span class="dot warn"></span>';
    return '<span class="dot bad"></span>';
  }

  async function refreshHealth() {
    try {
      const r = await fetch("/health");
      const h = await r.json();
      $("h-redis").innerHTML    = dot(h.redis === "ok" ? "ok" : "bad") + (h.redis || "—");
      $("h-chroma").innerHTML   = dot(h.chroma === "ok" ? "ok" : "off") + (h.chroma || "—");
      $("h-obsidian").innerHTML = dot(h.obsidian === "ok" ? "ok" : "off") + (h.obsidian || "—");
      $("h-audit").innerHTML    = (h.fuse_audit_entries != null ? h.fuse_audit_entries : "—");
    } catch (e) {
      $("h-redis").textContent = "unreachable";
    }
  }

  async function refreshGes() {
    try {
      const r = await fetch("/ges");
      const g = await r.json();
      const rows = Object.keys(g).sort().map(name => {
        const v = g[name];
        return `<span>${escapeHtml(name)}</span><b>${v == null ? "—" : v.toFixed ? v.toFixed(2) : v}</b>`;
      }).join("");
      $("ges").innerHTML = rows || "<span>—</span><b>no data yet</b>";
    } catch (e) {
      $("ges").innerHTML = "<span>—</span><b>unreachable</b>";
    }
  }

  async function refreshAudit() {
    try {
      const r = await fetch("/audit?n=8");
      const list = await r.json();
      if (!list.length) { $("audit").innerHTML = '<div class="row"><span class="lvl">—</span><span>no decisions yet</span></div>'; return; }
      $("audit").innerHTML = list.map(a => `
        <div class="row">
          <span class="lvl ${a.level}">${a.level[0]}</span>
          <span>${escapeHtml(a.agent || "?")}:${escapeHtml(a.action || "?")} <span style="color:var(--muted)">(${a.score || 0})</span></span>
        </div>`).join("");
    } catch (e) {
      $("audit").innerHTML = '<div class="row"><span class="lvl">!</span><span>unreachable</span></div>';
    }
  }

  function refreshSidebar() {
    refreshHealth(); refreshGes(); refreshAudit();
  }

  // ── input UX ─────────────────────────────────────────────────────────
  function autosize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(200, inputEl.scrollHeight) + "px";
  }
  inputEl.addEventListener("input", autosize);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener("click", send);

  // ── mode toggle ──────────────────────────────────────────────────────
  function setMode(m) {
    mode = m;
    modeAsk.classList.toggle("active",  m === "ask");
    modeTask.classList.toggle("active", m === "task");
    inputEl.placeholder = m === "task"
      ? "Describe a goal (Atlas will decompose and dispatch)..."
      : "Talk to Adonis... (Shift+Enter for newline)";
  }
  modeAsk.addEventListener("click",  () => setMode("ask"));
  modeTask.addEventListener("click", () => setMode("task"));

  resetBtn.addEventListener("click", () => {
    if (confirm("Clear conversation and start a new session?")) resetSession();
  });

  // ── boot ─────────────────────────────────────────────────────────────
  render();
  refreshSidebar();
  setInterval(refreshHealth, 15000);
  setInterval(() => { refreshGes(); refreshAudit(); }, 5000);
  inputEl.focus();
})();
</script>

</body>
</html>
